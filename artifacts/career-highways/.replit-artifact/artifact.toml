kind = "web"
previewPath = "/"
title = "Career Highways"
version = "1.0.0"
id = "artifacts/career-highways"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21131

[services.development]
run = "pnpm --filter @workspace/career-highways run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/career-highways", "run", "build" ]
publicDir = "artifacts/career-highways/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21131"
BASE_PATH = "/"
